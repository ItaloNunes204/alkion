services:
    postgres:
        image: postgres:16-alpine
        container_name: alkion_postgres
        environment:
            POSTGRES_USER: alkion
            POSTGRES_PASSWORD: alkion
            POSTGRES_DB: alkion_dev
            POSTGRES_HOST_AUTH_METHOD: trust
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
        ports:
            - "5432:5432"
        networks:
            - alkion_net
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: alkion_redis
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        ports:
            - "6379:6379"
        networks:
            - alkion_net
        restart: unless-stopped

volumes:
    postgres_data:
    redis_data:

networks:
    alkion_net:
        driver: bridge
